<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro - タスク管理</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #070714;
            --bg-secondary: #0d0d21;
            --bg-card: rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.16);
            --text-primary: #f0f0f8;
            --text-secondary: #8b8ba8;
            --text-muted: #3e3e5a;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 50%, #06b6d4 100%);
            --priority-high: #ef4444;
            --priority-medium: #f97316;
            --priority-low: #22c55e;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 40px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 50px rgba(139,92,246,0.12);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 10% 10%, rgba(139,92,246,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 60% at 90% 90%, rgba(6,182,212,0.05) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(59,130,246,0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── LAYOUT ─────────────────────────────────────────── */
        .app-layout {
            display: grid;
            grid-template-columns: 252px 1fr;
            grid-template-rows: 64px 1fr;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* ─── HEADER ─────────────────────────────────────────── */
        .header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            background: rgba(7,7,20,0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: var(--accent-gradient);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 24px rgba(139,92,246,0.45);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-date {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 5px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .streak-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            background: linear-gradient(135deg, rgba(251,146,60,0.12), rgba(239,68,68,0.12));
            border: 1px solid rgba(251,146,60,0.25);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #fb923c;
            cursor: default;
        }

        .btn-add {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 11px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(139,92,246,0.35);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(139,92,246,0.55);
        }

        /* ─── SIDEBAR ─────────────────────────────────────────── */
        .sidebar {
            background: rgba(10,10,28,0.6);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border);
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
        }

        .sidebar-sep {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 14px 12px 4px;
            margin-top: 4px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
            font-size: 13.5px;
            font-weight: 500;
            border: 1px solid transparent;
            user-select: none;
        }

        .sidebar-item:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .sidebar-item.active {
            background: rgba(139,92,246,0.13);
            color: #b4a3fc;
            border-color: rgba(139,92,246,0.28);
        }

        .sidebar-item .s-icon {
            width: 18px;
            text-align: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .sidebar-item .s-count {
            margin-left: auto;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 8px;
            background: rgba(255,255,255,0.07);
            color: var(--text-secondary);
            min-width: 20px;
            text-align: center;
        }

        .sidebar-item.active .s-count {
            background: rgba(139,92,246,0.25);
            color: #b4a3fc;
        }

        .p-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ─── MAIN ────────────────────────────────────────────── */
        .main {
            padding: 24px 28px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ─── QUOTE ───────────────────────────────────────────── */
        .quote-banner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(12px);
        }

        .quote-icon { font-size: 22px; flex-shrink: 0; }

        .quote-text {
            font-size: 13.5px;
            color: var(--text-secondary);
            line-height: 1.55;
            font-style: italic;
        }

        .quote-text strong {
            color: var(--text-primary);
            font-style: normal;
            font-weight: 600;
        }

        /* ─── STATS ───────────────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow);
        }

        .stat-card:hover::after { opacity: 1; }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 4px;
            letter-spacing: -1px;
        }

        .stat-sub { font-size: 12px; color: var(--text-secondary); }

        /* ─── PROGRESS ────────────────────────────────────────── */
        .progress-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 22px;
            backdrop-filter: blur(12px);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-title { font-size: 14px; font-weight: 600; }

        .progress-pct {
            font-size: 15px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-track {
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 4px;
            transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
            animation: shine 2.5s ease-in-out infinite;
        }

        @keyframes shine {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        /* ─── TASK LIST HEADER ────────────────────────────────── */
        .tasks-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tasks-title {
            font-size: 17px;
            font-weight: 700;
        }

        .tasks-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 13px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .search-bar:focus-within {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
        }

        .search-bar i { color: var(--text-muted); font-size: 13px; }

        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            width: 180px;
        }

        .search-bar input::placeholder { color: var(--text-muted); }

        .ctrl-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 13px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .ctrl-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-card-hover);
        }

        /* ─── SORT DROPDOWN ───────────────────────────────────── */
        .sort-wrap { position: relative; }

        .sort-menu {
            position: absolute;
            top: calc(100% + 5px);
            right: 0;
            background: #0f0f26;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px;
            min-width: 158px;
            box-shadow: var(--shadow);
            z-index: 60;
            display: none;
        }

        .sort-menu.open { display: block; }

        .sort-opt {
            padding: 8px 12px;
            border-radius: 7px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.15s;
        }

        .sort-opt:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .sort-opt.active { color: #b4a3fc; background: rgba(139,92,246,0.1); }

        /* ─── TASK CARDS ──────────────────────────────────────── */
        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 15px 18px 15px 22px;
            display: grid;
            grid-template-columns: 24px 1fr auto;
            gap: 13px;
            align-items: start;
            backdrop-filter: blur(12px);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        .task-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 0 2px 2px 0;
        }

        .task-card.pri-high::before   { background: var(--priority-high); }
        .task-card.pri-medium::before { background: var(--priority-medium); }
        .task-card.pri-low::before    { background: var(--priority-low); }

        .task-card:hover {
            border-color: var(--border-hover);
            transform: translateX(4px);
            box-shadow: var(--shadow);
        }

        .task-card.done {
            opacity: 0.45;
        }

        .task-card.done .task-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Checkbox */
        .chk {
            width: 22px;
            height: 22px;
            border-radius: 7px;
            border: 2px solid var(--border-hover);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            transition: all 0.28s ease;
        }

        .chk:hover { border-color: var(--accent-purple); }

        .chk.checked {
            background: var(--accent-gradient);
            border-color: transparent;
        }

        .chk.checked::after {
            content: '✓';
            color: #fff;
            font-size: 13px;
            font-weight: 800;
        }

        /* Task body */
        .task-body { min-width: 0; }

        .task-name {
            font-size: 14.5px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 7px;
            line-height: 1.4;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-high   { background: rgba(239,68,68,0.13);   color: #f87171; }
        .badge-medium { background: rgba(249,115,22,0.13);  color: #fb923c; }
        .badge-low    { background: rgba(34,197,94,0.13);   color: #4ade80; }

        .badge-todo     { background: rgba(99,102,241,0.13); color: #a5b4fc; }
        .badge-progress { background: rgba(245,158,11,0.13); color: #fcd34d; }
        .badge-done     { background: rgba(16,185,129,0.13); color: #34d399; }

        .badge-cat       { background: rgba(139,92,246,0.1); color: #c4b5fd; }
        .badge-requester { background: rgba(59,130,246,0.1); color: #93c5fd; }
        .badge-executor  { background: rgba(16,185,129,0.1); color: #6ee7b7; }

        .badge-date {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
        }

        .badge-date.overdue { background: rgba(239,68,68,0.1); color: #f87171; }
        .badge-date.today   { background: rgba(6,182,212,0.1); color: #22d3ee; }

        .task-notes {
            margin-top: 9px;
            font-size: 12.5px;
            color: var(--text-secondary);
            line-height: 1.55;
            padding: 8px 11px;
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: 7px;
            white-space: pre-wrap;
        }

        /* Actions */
        .task-actions {
            display: flex;
            gap: 4px;
            align-items: flex-start;
            opacity: 0;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .task-card:hover .task-actions { opacity: 1; }

        .act-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 7px;
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
        }

        .act-btn:hover         { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .act-btn.edit:hover    { background: rgba(139,92,246,0.15); color: #b4a3fc; }
        .act-btn.delete:hover  { background: rgba(239,68,68,0.15);  color: #f87171; }

        /* ─── EMPTY STATE ─────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 64px 20px;
            color: var(--text-muted);
        }

        .empty-state i   { font-size: 52px; display: block; margin-bottom: 18px; opacity: 0.2; }
        .empty-state p   { font-size: 15px; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state span{ font-size: 13px; }

        /* ─── MODAL ───────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: #0e0e26;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            width: 560px;
            max-width: 96vw;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 80px rgba(139,92,246,0.08);
            transform: translateY(24px) scale(0.96);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        .modal-overlay.open .modal {
            transform: translateY(0) scale(1);
        }

        .modal-head {
            padding: 22px 22px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title { font-size: 17px; font-weight: 700; }

        .modal-x {
            width: 30px;
            height: 30px;
            border: none;
            background: var(--bg-card);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: all 0.2s;
        }

        .modal-x:hover { background: var(--bg-card-hover); color: var(--text-primary); }

        .modal-body {
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .form-input, .form-select, .form-textarea {
            padding: 11px 13px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            width: 100%;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
            background: rgba(139,92,246,0.04);
        }

        .form-textarea { resize: vertical; min-height: 88px; line-height: 1.55; }

        .form-select option { background: #0e0e26; }

        /* Priority selector */
        .pri-group { display: flex; gap: 8px; }

        .pri-opt {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 12px 6px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pri-opt input { display: none; }
        .pri-opt .p-icon { font-size: 20px; }
        .pri-opt .p-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }

        .pri-opt.ph:hover, .pri-opt.ph.sel { border-color: #ef4444; background: rgba(239,68,68,0.08); }
        .pri-opt.pm:hover, .pri-opt.pm.sel { border-color: #f97316; background: rgba(249,115,22,0.08); }
        .pri-opt.pl:hover, .pri-opt.pl.sel { border-color: #22c55e; background: rgba(34,197,94,0.08); }

        .pri-opt.ph .p-lbl { color: #ef4444; }
        .pri-opt.pm .p-lbl { color: #f97316; }
        .pri-opt.pl .p-lbl { color: #22c55e; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-foot {
            padding: 0 22px 22px;
            display: flex;
            gap: 9px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-size: 13.5px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-sec {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-sec:hover { border-color: var(--border-hover); color: var(--text-primary); }

        .btn-pri {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 18px rgba(139,92,246,0.3);
        }

        .btn-pri:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(139,92,246,0.45);
        }

        /* ─── TOAST ───────────────────────────────────────────── */
        .toast-wrap {
            position: fixed;
            bottom: 22px;
            right: 22px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            z-index: 9999;
        }

        .toast {
            background: #181830;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 15px;
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 13.5px;
            font-weight: 600;
            box-shadow: var(--shadow);
            animation: toastIn 0.3s ease;
            max-width: 290px;
        }

        @keyframes toastIn {
            from { transform: translateX(110%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        @keyframes toastOut {
            from { transform: translateX(0);    opacity: 1; }
            to   { transform: translateX(110%); opacity: 0; }
        }

        .toast.success { border-color: rgba(16,185,129,0.28); }
        .toast.success .t-icon { color: #34d399; }
        .toast.warn    { border-color: rgba(245,158,11,0.28); }
        .toast.warn    .t-icon { color: #fbbf24; }

        /* ─── CONFETTI ────────────────────────────────────────── */
        .confetti-p {
            position: fixed;
            pointer-events: none;
            width: 7px;
            height: 7px;
            border-radius: 2px;
            z-index: 9999;
            animation: confettiAnim 1.1s ease forwards;
        }

        @keyframes confettiAnim {
            0%   { transform: translate(0,0) rotate(0deg)   scale(1);   opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(720deg) scale(0); opacity: 0; }
        }

        /* ─── SCROLLBAR ───────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

        /* ─── RESPONSIVE ──────────────────────────────────────── */
        @media (max-width: 860px) {
            .app-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 520px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .header-date { display: none; }
        }
    </style>
</head>
<body>
<div class="app-layout">

    <!-- ═══ HEADER ══════════════════════════════════════════════ -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <span class="logo-text">TaskFlow</span>
        </div>
        <div class="header-center">
            <div class="header-date" id="hDate"></div>
        </div>
        <div class="header-right">
            <div class="streak-badge" title="連続達成日数">
                🔥 <span id="streakNum">0</span>日連続
            </div>
            <button class="btn-add" onclick="openModal()" title="Ctrl+K">
                <i class="fa-solid fa-plus"></i>タスクを追加
            </button>
        </div>
    </header>

    <!-- ═══ SIDEBAR ══════════════════════════════════════════════ -->
    <aside class="sidebar">
        <div class="sidebar-sep">表示フィルター</div>
        <div class="sidebar-item active" onclick="setFilter('all',this)">
            <span class="s-icon"><i class="fa-solid fa-list-check"></i></span>
            すべてのタスク
            <span class="s-count" id="c-all">0</span>
        </div>
        <div class="sidebar-item" onclick="setFilter('today',this)">
            <span class="s-icon"><i class="fa-solid fa-calendar-day"></i></span>
            今日の期限
            <span class="s-count" id="c-today">0</span>
        </div>
        <div class="sidebar-item" onclick="setFilter('overdue',this)">
            <span class="s-icon"><i class="fa-solid fa-triangle-exclamation"></i></span>
            期限超過
            <span class="s-count" id="c-overdue">0</span>
        </div>
        <div class="sidebar-item" onclick="setFilter('done',this)">
            <span class="s-icon"><i class="fa-solid fa-circle-check"></i></span>
            完了済み
            <span class="s-count" id="c-done">0</span>
        </div>

        <div class="sidebar-sep">優先順位</div>
        <div class="sidebar-item" onclick="setFilter('pri-high',this)">
            <span class="p-dot" style="background:#ef4444"></span>
            高優先
            <span class="s-count" id="c-high">0</span>
        </div>
        <div class="sidebar-item" onclick="setFilter('pri-medium',this)">
            <span class="p-dot" style="background:#f97316"></span>
            中優先
            <span class="s-count" id="c-medium">0</span>
        </div>
        <div class="sidebar-item" onclick="setFilter('pri-low',this)">
            <span class="p-dot" style="background:#22c55e"></span>
            低優先
            <span class="s-count" id="c-low">0</span>
        </div>

        <div class="sidebar-sep">ステータス</div>
        <div class="sidebar-item" onclick="setFilter('s-todo',this)">
            <span class="s-icon"><i class="fa-solid fa-circle-dot" style="color:#a5b4fc"></i></span>
            未着手
            <span class="s-count" id="c-todo">0</span>
        </div>
        <div class="sidebar-item" onclick="setFilter('s-progress',this)">
            <span class="s-icon"><i class="fa-solid fa-rotate" style="color:#fcd34d"></i></span>
            進行中
            <span class="s-count" id="c-progress">0</span>
        </div>
        <div class="sidebar-item" onclick="setFilter('s-done',this)">
            <span class="s-icon"><i class="fa-solid fa-check" style="color:#34d399"></i></span>

            <span class="s-count" id="c-sdone">0</span>
        </div>

    <!-- ═══ MAIN ══════════════════════════════════════════════════ -->
    <main class="main">

        <!-- Quote -->
        <div class="quote-banner">
            <span class="quote-icon">💡</span>
            <div class="quote-text" id="quoteEl"></div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">総タスク数</div>
                <div class="stat-value" id="sTot"
                     style="background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">0</div>

                <div class="stat-label">完了済み</div>

            </div>
            <div class="stat-card">
                <div class="stat-label">今日の期限</div>
                <div class="stat-value" id="sToday" style="color:#22d3ee">0</div>

            <div class="stat-card">
                <div class="stat-label">期限超過</div>

        <!-- Task list -->
        <div class="tasks-header">

                <div class="sort-wrap">

                        <i class="fa-solid fa-arrow-up-wide-short"></i> 並び替え

        <div class="tasks-list" id="taskList"></div>

    </main>
</div>

<!-- ═══ MODAL ═══════════════════════════════════════════════════ -->
<div class="modal-overlay" id="overlay" onclick="overlayClick(event)">
    <div class="modal">
        <div class="modal-head">
            <h3 class="modal-title" id="mTitle">新しいタスク</h3>

        </div>

            <div class="form-group">
                <label class="form-label">タスク名 <span style="color:#f87171">*</span></label>

                    <label class="pri-opt pm" id="opt-m">

                        <span class="p-icon">🟠</span><span class="p-lbl">中</span>
                    </label>
                    <label class="pri-opt pl" id="opt-l">
                        <input type="radio" name="pri" value="low" onchange="syncPri()">
                        <span class="p-icon">🟢</span><span class="p-lbl">低</span>
                    </label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">ステータス</label>
                    <select class="form-select" id="fStatus">

                        <option value="progress">進行中</option>
                        <option value="done">完了</option>

                <div class="form-group">
                    <label class="form-label">期限日</label>

            <div class="form-row">

            <div class="form-group">

                <input class="form-input" id="fCat" type="text" placeholder="例: 仕事 / 個人 / 学習 ...">

            <div class="form-group">

    </div>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
const INITIAL_TASKS = [
    { id:'s1', name:'ゆうすけさん',                              priority:'high',   status:'todo', due:'', requester:'', executor:'', cat:'', notes:'',                                                                                                                                                   created:'2026-05-05T00:00:00.000Z' },
    { id:'s2', name:'しばさん 教育体制マニュアル',                priority:'medium', status:'todo', due:'', requester:'', executor:'', cat:'', notes:'',                                                                                                                                                   created:'2026-05-05T00:00:01.000Z' },
    { id:'s3', name:'cursorみる',                                 priority:'medium', status:'todo', due:'', requester:'', executor:'', cat:'', notes:'https://drive.google.com/file/d/18bYnPRUNl61NMbSRjhYHOId-l22AUUGO/view?usp=sharing',                                                              created:'2026-05-05T00:00:02.000Z' },
    { id:'s4', name:'X投稿',                                     priority:'medium', status:'todo', due:'', requester:'', executor:'', cat:'', notes:'',                                                                                                                                                   created:'2026-05-05T00:00:03.000Z' },
    { id:'s5', name:'対談依頼リスト',                             priority:'medium', status:'todo', due:'', requester:'', executor:'', cat:'', notes:'https://docs.google.com/document/d/1xqKEKCmnwztLQR-AgricNRh892ThpyyQjYqXOY09Kh4/edit?tab=t.0',                                                    created:'2026-05-05T00:00:04.000Z' },
    { id:'s6', name:'岩田さんのチャット参加ややること対応',        priority:'medium', status:'todo', due:'', requester:'', executor:'', cat:'', notes:'',                                                                                                                                                   created:'2026-05-05T00:00:05.000Z' },
    { id:'s7', name:'アメックス申請と物販講座',                    priority:'low',    status:'todo', due:'', requester:'', executor:'', cat:'', notes:'',                                                                                                                                                   created:'2026-05-05T00:00:06.000Z' },
    { id:'s8', name:'おと教育動画 台本作成・スペース確保',          priority:'low',    status:'todo', due:'', requester:'', executor:'', cat:'', notes:'',                                                                                                                                                   created:'2026-05-05T00:00:07.000Z' },
];

let tasks = JSON.parse(localStorage.getItem('tf_tasks') || 'null');
if (!tasks) { tasks = INITIAL_TASKS; localStorage.setItem('tf_tasks', JSON.stringify(tasks)); }
let streak  = parseInt(localStorage.getItem('tf_streak')   || '0');
let lastDay = localStorage.getItem('tf_lastday') || '';
let editId  = null;
let curFilter = 'all';
let curSort   = 'priority';

const PRI_ORD = { high:0, medium:1, low:2 };

const QUOTES = [
    { t:'一度に一歩ずつ。それが山を動かす唯一の方法だ。',       a:'アフリカのことわざ' },
    { t:'始めることが仕事の半分だ。',                           a:'ギリシャのことわざ' },
    { t:'完璧主義は先延ばしの別名だ。今すぐ始めよう。',         a:'ー' },
    { t:'大きな仕事も、小さなタスクの積み重ねから生まれる。',   a:'ー' },
    { t:'今日できることを明日に延ばすな。',                     a:'B.フランクリン' },
    { t:'集中力とは、大切なことに意識を向け続ける力だ。',       a:'ー' },
    { t:'毎日少しずつ前進することが、やがて大きな成果をもたらす。', a:'ー' },
    { t:'困難な道ほど、その先に素晴らしい景色がある。',         a:'ー' },
    { t:'タスクを小さく分けて、確実に前進しよう。',             a:'ー' },
    { t:'行動することが、自信を生む。',                         a:'デール・カーネギー' },
];

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
function init() {
    // Date header
    const now = new Date();
    document.getElementById('hDate').textContent =
        now.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

    // Quote
    const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    document.getElementById('quoteEl').innerHTML =
        `<strong>「${q.t}」</strong> — ${q.a}`;

    // Streak
    checkStreak();
    document.getElementById('streakNum').textContent = streak;

    renderAll();

    // Global listeners
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openModal(); }
    });
    document.addEventListener('click', e => {
        if (!e.target.closest('.sort-wrap')) closeSortMenu();
    });
}

/* ══════════════════════════════════════════════════════════
   STREAK
══════════════════════════════════════════════════════════ */
function checkStreak() {
    const today = new Date().toDateString();
    if (!lastDay) return;
    const ld = new Date(lastDay);
    const yest = new Date(); yest.setDate(yest.getDate() - 1);
    if (ld.toDateString() !== today && ld.toDateString() !== yest.toDateString()) {
        streak = 0;
        localStorage.setItem('tf_streak', '0');
    }
}

function bumpStreak() {
    const today = new Date().toDateString();
    if (lastDay === today) return;
    streak++;
    lastDay = today;
    localStorage.setItem('tf_streak', streak);
    localStorage.setItem('tf_lastday', today);
    document.getElementById('streakNum').textContent = streak;
}

/* ══════════════════════════════════════════════════════════
   FILTER / SORT
══════════════════════════════════════════════════════════ */
const FILTER_TITLES = {
    all:'すべてのタスク', today:'今日の期限', overdue:'期限超過タスク', done:'完了済みタスク',
    'pri-high':'高優先タスク', 'pri-medium':'中優先タスク', 'pri-low':'低優先タスク',
    's-todo':'未着手タスク', 's-progress':'進行中タスク', 's-done':'完了タスク',
};

function setFilter(f, el) {
    curFilter = f;
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    if (el) el.classList.add('active');
    document.getElementById('listTitle').textContent = FILTER_TITLES[f] || 'タスク';
    renderTasks();
}

function setSort(s, el) {
    curSort = s;
    document.querySelectorAll('.sort-opt').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
    closeSortMenu();
    renderTasks();
}

function toggleSort(e) {
    e.stopPropagation();
    document.getElementById('sortMenu').classList.toggle('open');
}

function closeSortMenu() {
    document.getElementById('sortMenu').classList.remove('open');
}

function todayStr() { return new Date().toDateString(); }

function dueDate(t) {
    return t.due ? new Date(t.due + 'T00:00:00') : null;
}

function isOverdue(t) {
    const d = dueDate(t);
    const today = new Date(); today.setHours(0,0,0,0);
    return d && d < today && d.toDateString() !== today.toDateString() && t.status !== 'done';
}

function isToday(t) {
    const d = dueDate(t);
    return d && d.toDateString() === new Date().toDateString();
}

function getFiltered() {
    const q = (document.getElementById('searchEl')?.value || '').toLowerCase();
    return tasks.filter(t => {
        const ms = !q || t.name.toLowerCase().includes(q)
            || (t.notes||'').toLowerCase().includes(q)
            || (t.cat||'').toLowerCase().includes(q);
        if (!ms) return false;
        switch (curFilter) {
            case 'all':        return true;
            case 'today':      return isToday(t);
            case 'overdue':    return isOverdue(t);
            case 'done':       return t.status === 'done';
            case 'pri-high':   return t.priority === 'high';
            case 'pri-medium': return t.priority === 'medium';
            case 'pri-low':    return t.priority === 'low';
            case 's-todo':     return t.status === 'todo';
            case 's-progress': return t.status === 'progress';
            case 's-done':     return t.status === 'done';
            default: return true;
        }
    });
}

function getSorted(arr) {
    return [...arr].sort((a, b) => {
        if (curSort === 'priority') {
            const d = PRI_ORD[a.priority] - PRI_ORD[b.priority];
            return d !== 0 ? d : new Date(b.created) - new Date(a.created);
        }
        if (curSort === 'due') {
            const da = dueDate(a), db = dueDate(b);
            if (!da && !db) return 0;
            if (!da) return 1;
            if (!db) return -1;
            return da - db;
        }
        if (curSort === 'created') return new Date(b.created) - new Date(a.created);
        if (curSort === 'name')    return a.name.localeCompare(b.name, 'ja');
        return 0;
    });
}

/* ══════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════ */
function renderAll() {
    renderStats();
    renderSideCounts();
    renderTasks();
}

function renderStats() {
    const tot  = tasks.length;
    const done = tasks.filter(t => t.status === 'done').length;
    const tod  = tasks.filter(t => isToday(t)).length;
    const over = tasks.filter(t => isOverdue(t)).length;
    const pct  = tot > 0 ? Math.round((done / tot) * 100) : 0;

    document.getElementById('sTot').textContent   = tot;
    document.getElementById('sDone').textContent  = done;
    document.getElementById('sToday').textContent = tod;
    document.getElementById('sOver').textContent  = over;
    document.getElementById('pPct').textContent   = pct + '%';
    document.getElementById('pBar').style.width   = pct + '%';
}

function renderSideCounts() {
    document.getElementById('c-all').textContent      = tasks.length;
    document.getElementById('c-today').textContent    = tasks.filter(t => isToday(t)).length;
    document.getElementById('c-overdue').textContent  = tasks.filter(t => isOverdue(t)).length;
    document.getElementById('c-done').textContent     = tasks.filter(t => t.status === 'done').length;
    document.getElementById('c-high').textContent     = tasks.filter(t => t.priority === 'high').length;
    document.getElementById('c-medium').textContent   = tasks.filter(t => t.priority === 'medium').length;
    document.getElementById('c-low').textContent      = tasks.filter(t => t.priority === 'low').length;
    document.getElementById('c-todo').textContent     = tasks.filter(t => t.status === 'todo').length;
    document.getElementById('c-progress').textContent = tasks.filter(t => t.status === 'progress').length;
    document.getElementById('c-sdone').textContent    = tasks.filter(t => t.status === 'done').length;
}

function renderTasks() {
    const el = document.getElementById('taskList');
    const items = getSorted(getFiltered());

    if (!items.length) {
        el.innerHTML = `
            <div class="empty-state">
                <i class="fa-solid fa-inbox"></i>
                <p>タスクがありません</p>
                <span>「タスクを追加」ボタンから新しいタスクを作成しましょう！</span>
            </div>`;
        return;
    }

    el.innerHTML = items.map(t => taskCard(t)).join('');
}

function esc(s) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
}

function taskCard(t) {
    const PRI_LBL = { high:'高優先', medium:'中優先', low:'低優先' };
    const STA_LBL = { todo:'未着手', progress:'進行中', done:'完了' };

    const today = new Date(); today.setHours(0,0,0,0);
    const d = dueDate(t);
    const over = d && d < today && d.toDateString() !== today.toDateString() && t.status !== 'done';
    const tod  = d && d.toDateString() === today.toDateString();

    let dateBadge = '';
    if (d) {
        const label = `${d.getMonth()+1}/${d.getDate()}`;
        const cls = over ? 'overdue' : tod ? 'today' : '';
        const icon = over ? '⚠' : '📅';
        dateBadge = `<span class="badge-date ${cls}">${icon} ${label}</span>`;
    }

    const catBadge = t.cat
        ? `<span class="badge badge-cat"><i class="fa-solid fa-tag" style="font-size:10px"></i>${esc(t.cat)}</span>`
        : '';

    const reqBadge = t.requester
        ? `<span class="badge badge-requester"><i class="fa-solid fa-user" style="font-size:10px"></i>${esc(t.requester)}</span>`
        : '';

    const exeBadge = t.executor
        ? `<span class="badge badge-executor"><i class="fa-solid fa-user-check" style="font-size:10px"></i>${esc(t.executor)}</span>`
        : '';

    const notes = t.notes
        ? `<div class="task-notes">${esc(t.notes)}</div>`
        : '';

    return `
        <div class="task-card pri-${t.priority} ${t.status==='done'?'done':''}" data-id="${t.id}">
            <div class="chk ${t.status==='done'?'checked':''}" onclick="toggleDone('${t.id}')"></div>
            <div class="task-body">
                <div class="task-name">${esc(t.name)}</div>
                <div class="task-meta">
                    <span class="badge badge-${t.priority}">${PRI_LBL[t.priority]}</span>
                    <span class="badge badge-${t.status}">${STA_LBL[t.status]}</span>
                    ${catBadge}
                    ${reqBadge}
                    ${exeBadge}
                    ${dateBadge}
                </div>
                ${notes}
            </div>
            <div class="task-actions">
                <button class="act-btn edit"   onclick="openEdit('${t.id}')" title="編集"><i class="fa-solid fa-pen"></i></button>
                <button class="act-btn delete" onclick="delTask('${t.id}')"  title="削除"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>`;
}

/* ══════════════════════════════════════════════════════════
   TASK OPS
══════════════════════════════════════════════════════════ */
function toggleDone(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    const wasDone = t.status === 'done';
    t.status = wasDone ? 'todo' : 'done';
    if (!wasDone) {
        bumpStreak();
        toast('🎉 タスク完了！お疲れさまです！', 'success');
        confetti();
    }
    save(); renderAll();
}

function delTask(id) {
    if (!confirm('このタスクを削除しますか？')) return;
    tasks = tasks.filter(t => t.id !== id);
    save(); renderAll();
    toast('タスクを削除しました', 'warn');
}

function save() { localStorage.setItem('tf_tasks', JSON.stringify(tasks)); }

/* ══════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════ */
function openModal() {
    editId = null;
    document.getElementById('mTitle').textContent = '新しいタスク';
    document.getElementById('fName').value = '';
    document.getElementById('fStatus').value = 'todo';
    document.getElementById('fDue').value = '';
    document.getElementById('fRequester').value = '';
    document.getElementById('fExecutor').value = '';
    document.getElementById('fCat').value = '';
    document.getElementById('fNotes').value = '';
    document.querySelector('[name="pri"][value="high"]').checked = true;
    syncPri();
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('fName').focus(), 80);
}

function openEdit(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    editId = id;
    document.getElementById('mTitle').textContent = 'タスクを編集';
    document.getElementById('fName').value = t.name;
    document.getElementById('fStatus').value = t.status;
    document.getElementById('fDue').value = t.due || '';
    document.getElementById('fRequester').value = t.requester || '';
    document.getElementById('fExecutor').value = t.executor || '';
    document.getElementById('fCat').value = t.cat || '';
    document.getElementById('fNotes').value = t.notes || '';
    const r = document.querySelector(`[name="pri"][value="${t.priority}"]`);
    if (r) r.checked = true;
    syncPri();
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('fName').focus(), 80);
}

function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editId = null;
}

function overlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
}

function saveTask() {
    const name = document.getElementById('fName').value.trim();
    if (!name) {
        const el = document.getElementById('fName');
        el.style.borderColor = '#ef4444';
        el.focus();
        setTimeout(() => el.style.borderColor = '', 1400);
        return;
    }
    const priority  = document.querySelector('[name="pri"]:checked')?.value || 'medium';
    const status    = document.getElementById('fStatus').value;
    const due       = document.getElementById('fDue').value;
    const requester = document.getElementById('fRequester').value.trim();
    const executor  = document.getElementById('fExecutor').value.trim();
    const cat       = document.getElementById('fCat').value.trim();
    const notes     = document.getElementById('fNotes').value.trim();

    if (editId) {
        const t = tasks.find(x => x.id === editId);
        if (t) Object.assign(t, { name, priority, status, due, requester, executor, cat, notes });
        toast('✅ タスクを更新しました', 'success');
    } else {
        tasks.push({ id: Date.now().toString(), name, priority, status, due, requester, executor, cat, notes, created: new Date().toISOString() });
        toast('✅ タスクを追加しました', 'success');
    }

    save(); renderAll(); closeModal();
}

function syncPri() {
    [['h','high'],['m','medium'],['l','low']].forEach(([k,v]) => {
        const r = document.querySelector(`[name="pri"][value="${v}"]`);
        document.getElementById(`opt-${k}`).classList.toggle('sel', r?.checked || false);
    });
}

/* ══════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════ */
function toast(msg, type='success') {
    const w = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    const icon = type === 'success' ? 'circle-check' : 'triangle-exclamation';
    el.innerHTML = `<span class="t-icon"><i class="fa-solid fa-${icon}"></i></span>${msg}`;
    w.appendChild(el);
    setTimeout(() => {
        el.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(() => el.remove(), 300);
    }, 3000);
}

/* ══════════════════════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════════════════════ */
function confetti() {
    const colors = ['#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#3b82f6'];
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-p';
        const angle = Math.random() * 360;
        const dist  = 80 + Math.random() * 140;
        const tx = Math.cos(angle * Math.PI / 180) * dist;
        const ty = Math.sin(angle * Math.PI / 180) * dist;
        p.style.cssText = `
            left:${cx}px; top:${cy}px;
            background:${colors[i % colors.length]};
            --tx:${tx}px; --ty:${ty}px;
            animation-duration:${0.7 + Math.random()*0.6}s;
            animation-delay:${Math.random()*0.2}s;
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1400);
    }
}

init();
</script>
